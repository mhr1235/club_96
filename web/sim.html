<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Club 96 Simulation</title>
  <link rel="icon" type="image/png" href="/static/graphics/club96.png" />
  <link rel="stylesheet" href="/static/styles.css" />
  <style>
    pre {
  white-space: pre-wrap;
  background: var(--color-code-bg);
  color: var(--color-code-text);
  padding: 1rem;
  border-radius: 12px;
  overflow-x: auto;
  border: 1px solid var(--color-code-border);
  font-size: 0.9rem;
}


    body {
      color: var(--color-page-text);
      padding: 2rem;
      max-width: 1000px;
      margin: auto;
    }

    h1 {
      margin-bottom: 0.25rem;
    }

    .subtitle {
      color: var(--color-muted);
      margin-bottom: 1.5rem;
    }

    .controls {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      margin-bottom: 1rem;
    }

    button {
      padding: 0.8rem 1rem;
      border-radius: 999px;
      border: 0;
      cursor: pointer;
      font-weight: bold;
    }

    button.danger {
      background: var(--color-danger);
      color: white;
    }

    .status {
      color: var(--color-muted);
      margin: 1rem 0;
    }

    .conversation {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin-top: 1.5rem;
    }

    .entry {
      border: 1px solid var(--color-border);
      border-radius: 16px;
      padding: 1.25rem;
      background: var(--color-panel-bg);
    }

    .entry h2 {
      margin: 0 0 0.5rem 0;
      text-transform: capitalize;
      font-size: 2rem;

    }

    .meta {
      color: rgba(255,255,255,0.9);
      font-size: 0.85rem;
      margin-bottom: 0.75rem;
    }

    .speech {
      font-size: 1.12rem;
      line-height: 1.55;
      margin-bottom: 0.25rem;
    }

    .cursor::after {
      content: "▋";
      margin-left: 2px;
      animation: blink 0.8s infinite;
    }

    h1{

        font-family: var(--font-mallory);
        color: red;

    }

    @keyframes blink {
      0%, 50% { opacity: 1; }
      51%, 100% { opacity: 0; }
    }

    .entry h2 a {
      color: inherit;
      text-decoration: none;
    }

    .entry h2 a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <h1>Club 96 Simulation</h1>
  <p class="subtitle">Alice, Bob, and Mallory respond to each other through a shared conversation log.</p>

  <p><a href="/">Back to intro page</a></p>

  <div class="controls">
    <button onclick="advanceSimulation()">Advance Simulation</button>
    <button onclick="runThreeTurns()">Run 3 Turns</button>
    <button class="danger" onclick="resetSimulation()">Reset Conversation</button>
    <button class="danger" onclick="resetTasks()">Reset Tasks</button>
    <button class="danger" onclick="resetMemories()">Reset Memories</button>
    <button class="danger" onclick="resetStates()">Reset States</button>
    <button class="danger" onclick="resetRuntime()">Reset All Runtime</button>
  </div>

  <div id="status" class="status">Ready.</div>

  <div id="conversation" class="conversation"></div>
 

  

  <script>
    let latestConversationKey = "";
    let isTyping = false;

    function getConversationKey(conversation) {
      if (!conversation || conversation.length === 0) {
        return "empty";
      }

      const latest = conversation[conversation.length - 1];
      return `${conversation.length}:${latest.turn}:${latest.speaker}:${latest.speech}`;
    }

    function typeText(element, text, speed = 18) {
      element.textContent = "";
      element.classList.add("cursor");
      isTyping = true;

      let index = 0;

      function typeNextCharacter() {
        if (index < text.length) {
          element.textContent += text[index];
          index++;
          setTimeout(typeNextCharacter, speed);
        } else {
          element.classList.remove("cursor");
          isTyping = false;
        }
      }

      typeNextCharacter();
    }

function renderConversation(conversation, animateLast = false) {
  const container = document.getElementById("conversation");
  latestConversationKey = getConversationKey(conversation);

  if (!conversation || conversation.length === 0) {
    container.innerHTML = `
      <div class="entry">
        <h2>No conversation yet</h2>
        <div class="speech">Click “Advance Simulation” to begin.</div>
      </div>
    `;
    return;
  }

  container.innerHTML = conversation.map((entry, index) => {
    const isLast = index === conversation.length - 1;
    const speech = entry.speech || "No speech returned.";

    return `
     <div class="entry ${entry.speaker}">
        <h2><a href="/agents/${entry.speaker}">${entry.speaker}</a></h2>
        <div class="meta">Turn ${entry.turn} · Mood: ${entry.mood || "—"}</div>

        <div class="speech" id="${isLast ? "latest-speech" : ""}">
          ${animateLast && isLast ? "" : speech}
        </div>

        <div class="label">Action</div>
        <pre>${JSON.stringify(entry.action || {}, null, 2)}</pre>

        <div class="label">Memory Update</div>
        <div>${entry.memory_update || "—"}</div>
      </div>
    `;
  }).join("");

  if (animateLast) {
    const latest = conversation[conversation.length - 1];
    const latestElement = document.getElementById("latest-speech");

    if (latestElement) {
      typeText(latestElement, latest.speech || "No speech returned.");
    }
  }

  window.scrollTo({
    top: document.body.scrollHeight,
    behavior: "smooth"
  });
}
    async function loadConversation(onlyIfChanged = false) {
      if (isTyping && onlyIfChanged) {
        return false;
      }

      const response = await fetch("/api/sim/conversation", {
        cache: "no-store"
      });
      const conversation = await response.json();

      if (onlyIfChanged && getConversationKey(conversation) === latestConversationKey) {
        return false;
      }

      renderConversation(conversation, false);
      return true;
    }

    async function advanceSimulation() {
      document.getElementById("status").textContent = "Advancing simulation...";
      const pollWhileRunning = setInterval(() => loadConversation(true), 1000);

      try {
        const response = await fetch("/api/sim/tick", {
          method: "POST"
        });

        const data = await response.json();

        if (!response.ok || data.result?.error) {
          throw new Error(data.result?.error || data.error || `HTTP ${response.status}`);
        }

        if (data.conversation) {
          renderConversation(data.conversation, true);
        }

        document.getElementById("status").textContent = `Finished ${data.agent}.`;
        return data;
      } catch (error) {
        document.getElementById("status").textContent = `Error: ${error}`;
        throw error;
      } finally {
        clearInterval(pollWhileRunning);
      }
    }

    async function runThreeTurns() {
      document.getElementById("status").textContent = "Running three turns...";

      for (let i = 0; i < 3; i++) {
        document.getElementById("status").textContent = `Running turn ${i + 1} of 3...`;
        try {
          await advanceSimulation();
        } catch (error) {
          document.getElementById("status").textContent = `Stopped on turn ${i + 1}: ${error.message}`;
          return;
        }
      }

      document.getElementById("status").textContent = "Finished three turns.";
    }

    async function resetSimulation() {
      const confirmed = confirm("Reset the conversation log?");
      if (!confirmed) return;

      const response = await fetch("/api/sim/reset", {
        method: "POST"
      });

      const data = await response.json();
      renderConversation(data.conversation, false);
      document.getElementById("status").textContent = "Conversation reset.";
    }

    async function postReset(endpoint, message) {
      const confirmed = confirm(message);
      if (!confirmed) return null;

      const response = await fetch(endpoint, {
        method: "POST"
      });

      return response.json();
    }

    async function resetTasks() {
      const data = await postReset("/api/sim/reset-tasks", "Reset all shared tasks/goals?");
      if (!data) return;

      document.getElementById("status").textContent = "Tasks reset.";
    }

    async function resetMemories() {
      const data = await postReset("/api/sim/reset-memories", "Reset all agent memories?");
      if (!data) return;

      document.getElementById("status").textContent = "Memories reset.";
    }

    async function resetStates() {
      const data = await postReset("/api/sim/reset-states", "Reset all agent states to neutral/full energy?");
      if (!data) return;

      document.getElementById("status").textContent = "Agent states reset.";
    }

    async function resetRuntime() {
      const data = await postReset(
        "/api/sim/reset-runtime",
        "Reset conversation, tasks, memories, and agent states?"
      );
      if (!data) return;

      renderConversation(data.conversation, false);
      document.getElementById("status").textContent = "All runtime files reset.";
    }

    loadConversation();
    setInterval(() => loadConversation(true), 1500);
  </script>
</body>
</html>

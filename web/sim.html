<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Club 96 Simulation</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #111;
      color: #f4f4f4;
      padding: 2rem;
      max-width: 1000px;
      margin: auto;
    }

    h1 {
      margin-bottom: 0.25rem;
    }

    .subtitle {
      color: #aaa;
      margin-bottom: 1.5rem;
    }

    .controls {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      margin-bottom: 1rem;
    }

    button {
      padding: 0.8rem 1rem;
      border-radius: 999px;
      border: 0;
      cursor: pointer;
      font-weight: bold;
    }

    button.danger {
      background: #5a1a1a;
      color: white;
    }

    .status {
      color: #aaa;
      margin: 1rem 0;
    }

    .conversation {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin-top: 1.5rem;
    }

    .entry {
      border: 1px solid #444;
      border-radius: 16px;
      padding: 1.25rem;
      background: #1c1c1c;
    }

    .entry h2 {
      margin: 0 0 0.5rem 0;
      text-transform: capitalize;
    }

    .meta {
      color: #aaa;
      font-size: 0.85rem;
      margin-bottom: 0.75rem;
    }

    .speech {
      font-size: 1.05rem;
      line-height: 1.55;
      margin-bottom: 1rem;
    }

    .label {
      color: #aaa;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-top: 0.75rem;
    }

    pre {
      white-space: pre-wrap;
      background: #000;
      padding: 1rem;
      border-radius: 12px;
      overflow-x: auto;
    }

    a {
      color: #9ad;
    }
  </style>
</head>
<body>
  <h1>Club 96 Simulation</h1>
  <p class="subtitle">Alice, Bob, and Mallory respond to each other through a shared conversation log.</p>

  <p><a href="/">Back to intro page</a></p>

  <div class="controls">
    <button onclick="advanceSimulation()">Advance Simulation</button>
    <button onclick="runThreeTurns()">Run 3 Turns</button>
    <button class="danger" onclick="resetSimulation()">Reset Conversation</button>
  </div>

  <div id="status" class="status">Ready.</div>

  <div id="conversation" class="conversation"></div>

  <script>
    function formatAction(action) {
      if (!action) return "—";
      return JSON.stringify(action, null, 2);
    }

    function renderConversation(conversation) {
      const container = document.getElementById("conversation");

      if (!conversation || conversation.length === 0) {
        container.innerHTML = `
          <div class="entry">
            <h2>No conversation yet</h2>
            <div class="speech">Click “Advance Simulation” to begin.</div>
          </div>
        `;
        return;
      }

      container.innerHTML = conversation.map((entry) => `
        <div class="entry">
          <h2>${entry.speaker}</h2>
          <div class="meta">Turn ${entry.turn} · Mood: ${entry.mood || "—"}</div>

          <div class="speech">${entry.speech || "No speech returned."}</div>

          <div class="label">Action</div>
          <pre>${formatAction(entry.action)}</pre>

          <div class="label">Memory Update</div>
          <div>${entry.memory_update || "—"}</div>
        </div>
      `).join("");

      window.scrollTo({
        top: document.body.scrollHeight,
        behavior: "smooth"
      });
    }

    async function loadConversation() {
      const response = await fetch("/api/sim/conversation");
      const conversation = await response.json();
      renderConversation(conversation);
    }

    async function advanceSimulation() {
      document.getElementById("status").textContent = "Advancing simulation...";

      try {
        const response = await fetch("/api/sim/tick", {
          method: "POST"
        });

        const data = await response.json();

        renderConversation(data.conversation);
        document.getElementById("status").textContent = `Finished ${data.agent}.`;
      } catch (error) {
        document.getElementById("status").textContent = `Error: ${error}`;
      }
    }

    async function runThreeTurns() {
      document.getElementById("status").textContent = "Running three turns...";

      for (let i = 0; i < 3; i++) {
        await advanceSimulation();
      }

      document.getElementById("status").textContent = "Finished three turns.";
    }

    async function resetSimulation() {
      const confirmed = confirm("Reset the conversation log?");
      if (!confirmed) return;

      const response = await fetch("/api/sim/reset", {
        method: "POST"
      });

      const data = await response.json();
      renderConversation(data.conversation);
      document.getElementById("status").textContent = "Conversation reset.";
    }

    loadConversation();
  </script>
</body>
</html>

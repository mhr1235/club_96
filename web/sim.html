<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Club 96 Simulation</title>
  <style>
    pre {
  white-space: pre-wrap;
  background: #000;
  color: #d6d6d6;
  padding: 1rem;
  border-radius: 12px;
  overflow-x: auto;
  border: 1px solid #222;
  font-size: 0.9rem;
}


    body {
      font-family: system-ui, sans-serif;
      background: #111;
      color: #f4f4f4;
      padding: 2rem;
      max-width: 1000px;
      margin: auto;
    }

    h1 {
      margin-bottom: 0.25rem;
    }

    .subtitle {
      color: #aaa;
      margin-bottom: 1.5rem;
    }

    .controls {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      margin-bottom: 1rem;
    }

    button {
      padding: 0.8rem 1rem;
      border-radius: 999px;
      border: 0;
      cursor: pointer;
      font-weight: bold;
    }

    button.danger {
      background: #5a1a1a;
      color: white;
    }

    .status {
      color: #aaa;
      margin: 1rem 0;
    }

    .conversation {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin-top: 1.5rem;
    }

    .entry {
      border: 1px solid #444;
      border-radius: 16px;
      padding: 1.25rem;
      background: #1c1c1c;
    }

    .entry h2 {
      margin: 0 0 0.5rem 0;
      text-transform: capitalize;
      font-size: 2rem;

    }

    @font-face {
  font-family: "GerardoVelazquez";
  src: url("/static/fonts/GerardoVela-zquez.woff") format("woff");
}

@font-face {
  font-family: "ThirdWorldGayRevolution";
  src: url("/static/fonts/ThirdWorldGayRevolution.woff") format("woff");
}

@font-face {
  font-family: "Moonstorm";
  src: url("/static/fonts/Moonstorm.woff") format("woff");
}

.entry.alice {
  background: #c692e7;
  color: #111;
}

.entry.bob {
  background: #ffbc61;
  color: #111;
}

.entry.mallory {
  background: #a8f49c;
  color: #111;
}

.entry.alice h2 {
  font-family: "ThirdWorldGayRevolution", system-ui, sans-serif;
}

.entry.bob h2 {
  font-family: "Moonstorm", system-ui, sans-serif;
}

.entry.mallory h2 {
  font-family: "GerardoVelazquez", system-ui, sans-serif;
}

.entry.alice .speech {
  font-family: "ThirdWorldGayRevolution", system-ui, sans-serif;
}

.entry.bob .speech {
  font-family: "Moonstorm", system-ui, sans-serif;
}

.entry.mallory .speech {
  font-family: "GerardoVelazquez", system-ui, sans-serif;
}

    .meta {
      color: rgba(255,255,255,0.9);
      font-size: 0.85rem;
      margin-bottom: 0.75rem;
    }

    .speech {
      font-size: 1.12rem;
      line-height: 1.55;
      margin-bottom: 0.25rem;
    }

    .cursor::after {
      content: "▋";
      margin-left: 2px;
      animation: blink 0.8s infinite;
    }

    h1{

        font-family: "GerardoVelazquez", system-ui, sans-serif;
        color: red;

    }

    @keyframes blink {
      0%, 50% { opacity: 1; }
      51%, 100% { opacity: 0; }
    }

    a {
      color: #9ad;
    }
  </style>
</head>
<body>
  <h1>Club 96 Simulation</h1>
  <p class="subtitle">Alice, Bob, and Mallory respond to each other through a shared conversation log.</p>

  <p><a href="/">Back to intro page</a></p>

  <div class="controls">
    <button onclick="advanceSimulation()">Advance Simulation</button>
    <button onclick="runThreeTurns()">Run 3 Turns</button>
    <button class="danger" onclick="resetSimulation()">Reset Conversation</button>
  </div>

  <div id="status" class="status">Ready.</div>

  <div id="conversation" class="conversation"></div>
 

  

  <script>
    function typeText(element, text, speed = 18) {
      element.textContent = "";
      element.classList.add("cursor");

      let index = 0;

      function typeNextCharacter() {
        if (index < text.length) {
          element.textContent += text[index];
          index++;
          setTimeout(typeNextCharacter, speed);
        } else {
          element.classList.remove("cursor");
        }
      }

      typeNextCharacter();
    }

function renderConversation(conversation, animateLast = false) {
  const container = document.getElementById("conversation");

  if (!conversation || conversation.length === 0) {
    container.innerHTML = `
      <div class="entry ${entry.speaker}">
        <h2>No conversation yet</h2>
        <div class="speech">Click “Advance Simulation” to begin.</div>
      </div>
    `;
    return;
  }

  container.innerHTML = conversation.map((entry, index) => {
    const isLast = index === conversation.length - 1;
    const speech = entry.speech || "No speech returned.";

    return `
     <div class="entry ${entry.speaker}">
        <h2>${entry.speaker}</h2>
        <div class="meta">Turn ${entry.turn} · Mood: ${entry.mood || "—"}</div>

        <div class="speech" id="${isLast ? "latest-speech" : ""}">
          ${animateLast && isLast ? "" : speech}
        </div>

        <div class="label">Action</div>
        <pre>${JSON.stringify(entry.action || {}, null, 2)}</pre>

        <div class="label">Memory Update</div>
        <div>${entry.memory_update || "—"}</div>
      </div>
    `;
  }).join("");

  if (animateLast) {
    const latest = conversation[conversation.length - 1];
    const latestElement = document.getElementById("latest-speech");

    if (latestElement) {
      typeText(latestElement, latest.speech || "No speech returned.");
    }
  }

  window.scrollTo({
    top: document.body.scrollHeight,
    behavior: "smooth"
  });
}
    async function loadConversation() {
      const response = await fetch("/api/sim/conversation");
      const conversation = await response.json();
      renderConversation(conversation, false);
    }

    async function advanceSimulation() {
      document.getElementById("status").textContent = "Advancing simulation...";

      try {
        const response = await fetch("/api/sim/tick", {
          method: "POST"
        });

        const data = await response.json();

        renderConversation(data.conversation, true);
        document.getElementById("status").textContent = `Finished ${data.agent}.`;
      } catch (error) {
        document.getElementById("status").textContent = `Error: ${error}`;
      }
    }

    async function runThreeTurns() {
      document.getElementById("status").textContent = "Running three turns...";

      for (let i = 0; i < 3; i++) {
        await advanceSimulation();
      }

      document.getElementById("status").textContent = "Finished three turns.";
    }

    async function resetSimulation() {
      const confirmed = confirm("Reset the conversation log?");
      if (!confirmed) return;

      const response = await fetch("/api/sim/reset", {
        method: "POST"
      });

      const data = await response.json();
      renderConversation(data.conversation, false);
      document.getElementById("status").textContent = "Conversation reset.";
    }

    loadConversation();
  </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Agent Dialogue</title>
  <link rel="icon" type="image/png" href="/static/graphics/club96.png" />
  <link rel="stylesheet" href="/static/styles.css?v=agent-font-controls-1" />
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      margin: 0;
    }

    body {
      overflow: hidden;
    }

    main {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      padding: clamp(1.5rem, 3vw, 3rem);
      position: relative;
    }

    h1 {
      font-size: clamp(4rem, 8vw, 9rem);
      line-height: 0.9;
      margin: 0 0 clamp(1.25rem, 3vw, 2.5rem);
      text-transform: uppercase;
    }

    .meta {
      color: var(--color-agent-meta);
      font-size: clamp(1.4rem, 2vw, 2.25rem);
      line-height: 1.2;
      margin-bottom: clamp(1.4rem, 3vw, 2.5rem);
    }

    .meta {

      display: none;
    }

    .speech {
      color: var(--color-agent-text);
      font-size: clamp(2rem, 3.6vw, 5rem);
      line-height: 1.25;
      overflow-wrap: break-word;
      /* text-transform: uppercase; */
    }

    .speech-shell {
      flex: 1;
      min-height: 0;
      position: relative;
    }

    .spiral-canvas {
      inset: 0;
      opacity: 0;
      pointer-events: none;
      position: absolute;
      transition: opacity 180ms ease;
      width: 100%;
      height: 100%;
    }

    .thinking .speech {
      opacity: 0;
    }

    .thinking .spiral-canvas {
      opacity: 1;
    }

    .waiting {
      font-family: system-ui, sans-serif;
      text-transform: none;
    }

    .cursor::after {
      content: "▋";
      margin-left: 2px;
      animation: blink 0.8s infinite;
    }

    @keyframes blink {
      0%, 50% { opacity: 1; }
      51%, 100% { opacity: 0; }
    }

  </style>
</head>

<body>
  <main id="page" class="">
    <h1 id="agent-name">Agent</h1>
    <div id="meta" class="meta">Waiting for output.</div>
    <div class="speech-shell">
      <div id="speech" class="speech waiting">Start or advance the simulation to update this display.</div>
      <canvas id="spiral" class="spiral-canvas"></canvas>
    </div>
  </main>

  <script>
    const pollIntervalMs = 1500;
    const statusPollIntervalMs = 1000;
    const fetchTimeoutMs = 5000;
    let latestTurnKey = "";
    let isTyping = false;
    let isThinking = false;
    let spiralFrameId = 0;
    let spiralIsAnimating = false;
    let holdThinkingUntilNextDialogue = false;
    let thinkingHoldTimeoutId = 0;
    let dialoguePollInFlight = false;
    let statusPollInFlight = false;
    let lastAgentWasActive = false;

    async function fetchWithTimeout(url, options = {}) {
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), fetchTimeoutMs);

      try {
        return await fetch(url, {
          ...options,
          signal: controller.signal,
        });
      } finally {
        clearTimeout(timeoutId);
      }
    }

    function titleize(value) {
      return value.charAt(0).toUpperCase() + value.slice(1);
    }

    function setText(id, value) {
      const element = document.getElementById(id);
      if (element) {
        element.textContent = value;
      }
    }

    function getDisplayFontSize() {
      const speech = document.getElementById("speech");
      if (speech) {
        speech.style.fontSize = "";
        return parseFloat(getComputedStyle(speech).fontSize) || 48;
      }

      const widthSize = window.innerWidth * 0.036;
      return Math.max(32, Math.min(widthSize, 80));
    }

    function fitSpeechToViewport() {
      const speech = document.getElementById("speech");
      const page = document.getElementById("page");
      if (!speech || !page) {
        return;
      }

      const styles = getComputedStyle(page);
      const bottomPadding = parseFloat(styles.paddingBottom) || 0;
      const availableHeight = window.innerHeight - speech.offsetTop - bottomPadding - 12;
      const maxSize = getDisplayFontSize();
      const minSize = 20;

      speech.style.fontSize = `${maxSize}px`;

      let size = maxSize;
      while (speech.scrollHeight > availableHeight && size > minSize) {
        size -= 2;
        speech.style.fontSize = `${size}px`;
      }
    }

    function setSpeech(value) {
      setText("speech", value);
      requestAnimationFrame(fitSpeechToViewport);
    }

    function resizeSpiralCanvas() {
      const canvas = document.getElementById("spiral");
      const shell = document.querySelector(".speech-shell");
      if (!canvas || !shell) {
        return;
      }

      const rect = shell.getBoundingClientRect();
      const scale = window.devicePixelRatio || 1;
      canvas.width = Math.max(1, Math.floor(rect.width * scale));
      canvas.height = Math.max(1, Math.floor(rect.height * scale));
    }

    function getAgentNameFromPath() {
      const pathParts = window.location.pathname.split("/");
      return pathParts[pathParts.length - 1];
    }

    function getWarpText() {
      const speech = document.getElementById("speech");
      if (!speech) {
        return "thinking thinking thinking";
      }

      const text = speech.textContent.replace(/\s+/g, " ").trim();

      if (!text || speech.classList.contains("waiting")) {
        const agentName = titleize(getAgentNameFromPath());
        return Array(18).fill(`${agentName} is thinking`).join(" ");
      }

      return text;
    }

    function wrapTextForCanvas(context, text, maxWidth) {
      const words = text.replace(/\s+/g, " ").trim().split(" ");
      const lines = [];
      let line = "";

      for (const word of words) {
        const nextLine = line ? `${line} ${word}` : word;

        if (line && context.measureText(nextLine).width > maxWidth) {
          lines.push(line);
          line = word;
        } else {
          line = nextLine;
        }
      }

      if (line) {
        lines.push(line);
      }

      return lines.length ? lines : ["thinking"];
    }

    function twirlPoint(x, y, centerX, centerY, maxRadius, time, index) {
      const dx = x - centerX;
      const dy = y - centerY;
      const radius = Math.hypot(dx, dy);
      const normalizedRadius = Math.min(1, radius / maxRadius);
      const pull = Math.pow(1 - normalizedRadius, 2.15);
      const spin = time * 0.0012;
      const twist = pull * (Math.PI * 2.8 + Math.sin(time * 0.002 + index * 0.21) * 0.65);
      const angle = Math.atan2(dy, dx) + twist + spin;
      const wave = Math.sin(time * 0.003 + radius * 0.035 + index * 0.13) * 10 * pull;
      const warpedRadius = radius + wave - pull * 18;

      return {
        x: centerX + Math.cos(angle) * warpedRadius,
        y: centerY + Math.sin(angle) * warpedRadius * (0.72 + pull * 0.18),
        angle,
        pull,
        radius,
      };
    }

    function drawWarpedSpeech(time = 0) {
      if (!isThinking) {
        spiralIsAnimating = false;
        return;
      }

      spiralIsAnimating = true;

      const canvas = document.getElementById("spiral");
      const speech = document.getElementById("speech");
      const shell = document.querySelector(".speech-shell");
      if (!canvas || !speech || !shell) {
        spiralIsAnimating = false;
        return;
      }

      const context = canvas.getContext("2d");
      if (!context) {
        spiralIsAnimating = false;
        return;
      }

      const rect = shell.getBoundingClientRect();
      const scale = window.devicePixelRatio || 1;
      const text = getWarpText();
      const styles = getComputedStyle(speech);
      const fontSize = parseFloat(styles.fontSize) || 48;
      const fontFamily = styles.fontFamily || "system-ui, sans-serif";
      const lineHeight = parseFloat(styles.lineHeight) || fontSize * 1.25;

      if (canvas.width !== Math.floor(rect.width * scale) || canvas.height !== Math.floor(rect.height * scale)) {
        resizeSpiralCanvas();
      }

      context.setTransform(scale, 0, 0, scale, 0, 0);
      context.clearRect(0, 0, rect.width, rect.height);
      context.fillStyle = getComputedStyle(document.documentElement).getPropertyValue("--color-agent-text").trim() || "#111";
      context.font = `${fontSize}px ${fontFamily}`;
      context.textBaseline = "middle";

      const lines = wrapTextForCanvas(context, text, rect.width);
      const centerX = rect.width * 0.54 + Math.sin(time * 0.0011) * rect.width * 0.05;
      const centerY = rect.height * 0.48;
      const maxRadius = Math.max(rect.width, rect.height) * 0.62;
      const startY = lineHeight * 0.5;
      let characterIndex = 0;

      for (let lineIndex = 0; lineIndex < lines.length; lineIndex++) {
        const line = lines[lineIndex];
        let x = 0;
        const y = startY + lineIndex * lineHeight;

        for (const char of line) {
          const charWidth = context.measureText(char).width;
          const sourceX = x + charWidth * 0.5;
          const sourceY = y;
          const point = twirlPoint(sourceX, sourceY, centerX, centerY, maxRadius, time, characterIndex);
          const tangent = point.angle + Math.PI / 2;
          const stretch = 1 + point.pull * 1.8 + Math.sin(time * 0.002 + characterIndex) * point.pull * 0.3;
          const squash = 1 - point.pull * 0.42;
          const alpha = 0.42 + point.pull * 0.58;

          context.save();
          context.globalAlpha = alpha;
          context.translate(point.x, point.y);
          context.rotate(tangent);
          context.scale(stretch, Math.max(0.42, squash));
          context.fillText(char, -charWidth * 0.5, 0);
          context.restore();

          x += charWidth;
          characterIndex++;
        }
      }

      spiralFrameId = requestAnimationFrame(drawWarpedSpeech);
    }

    function startSpiralAnimation() {
      if (spiralIsAnimating) {
        return;
      }

      resizeSpiralCanvas();
      spiralFrameId = requestAnimationFrame(drawWarpedSpeech);
    }

    function setThinking(nextIsThinking) {
      if (isThinking === nextIsThinking) {
        if (isThinking) {
          startSpiralAnimation();
        }

        return;
      }

      isThinking = nextIsThinking;
      const page = document.getElementById("page");
      if (!page) {
        return;
      }

      page.classList.toggle("thinking", isThinking);

      if (isThinking) {
        startSpiralAnimation();
      } else {
        cancelAnimationFrame(spiralFrameId);
        spiralIsAnimating = false;
        const canvas = document.getElementById("spiral");
        const context = canvas ? canvas.getContext("2d") : null;

        if (canvas && context) {
          context.clearRect(0, 0, canvas.width, canvas.height);
        }
      }
    }

    function clearThinkingHold() {
      holdThinkingUntilNextDialogue = false;
      clearTimeout(thinkingHoldTimeoutId);
      thinkingHoldTimeoutId = 0;
    }

    function holdThinkingForIncomingDialogue() {
      if (holdThinkingUntilNextDialogue) {
        return;
      }

      holdThinkingUntilNextDialogue = true;
      thinkingHoldTimeoutId = setTimeout(() => {
        clearThinkingHold();
        setThinking(false);
      }, 8000);
    }

    function typeText(element, text, speed = 18) {
      if (!element) {
        return;
      }

      element.textContent = "";
      element.classList.add("cursor");
      isTyping = true;
      setThinking(false);

      let index = 0;

      function typeNextCharacter() {
        if (index < text.length) {
          element.textContent += text[index];
          index++;
          requestAnimationFrame(fitSpeechToViewport);
          setTimeout(typeNextCharacter, speed);
        } else {
          element.classList.remove("cursor");
          isTyping = false;
          loadThinkingStatus();
        }
      }

      typeNextCharacter();
    }

    function typeSpeech(value) {
      const speech = document.getElementById("speech");
      if (!speech) {
        return;
      }

      typeText(speech, value);
    }

    async function loadAgentDialogue() {
      if (isTyping || dialoguePollInFlight) {
        return;
      }

      dialoguePollInFlight = true;

      try {
        const agentName = getAgentNameFromPath();

        const response = await fetchWithTimeout("/api/sim/conversation", {
          cache: "no-store"
        });

        if (!response.ok) {
          return;
        }

        const conversation = await response.json();
        const filtered = conversation.filter(entry => entry.speaker === agentName);
        const latest = filtered[filtered.length - 1];

        document.title = `${titleize(agentName)} Dialogue`;
        const page = document.getElementById("page");
        const speech = document.getElementById("speech");
        if (!page || !speech) {
          return;
        }

        page.className = `${agentName}${isThinking ? " thinking" : ""}`;
        setText("agent-name", titleize(agentName));

        if (!latest) {
          setText("meta", "Waiting for output.");
          speech.classList.add("waiting");
          setSpeech(`No dialogue yet for ${titleize(agentName)}.`);
          return;
        }

        const turnKey = `${latest.turn}:${latest.speech}`;
        if (turnKey === latestTurnKey) {
          return;
        }

        latestTurnKey = turnKey;
        setText("meta", `Turn ${latest.turn} · Mood: ${latest.mood || "—"}`);
        speech.classList.remove("waiting");
        clearThinkingHold();
        typeSpeech(latest.speech || "No speech returned.");
      } catch (error) {
        console.error("Agent dialogue poll failed:", error);
      } finally {
        dialoguePollInFlight = false;
      }
    }

    async function loadThinkingStatus() {
      if (statusPollInFlight) {
        return;
      }

      statusPollInFlight = true;

      try {
        const agentName = getAgentNameFromPath();
        const response = await fetchWithTimeout("/api/sim/status", {
          cache: "no-store"
        });

        if (!response.ok) {
          return;
        }

        const status = await response.json();
        const agentIsActive = status.active_agent === agentName;

        if (agentIsActive) {
          lastAgentWasActive = true;
          clearThinkingHold();
          setThinking(!isTyping);
          return;
        }

        if (lastAgentWasActive) {
          lastAgentWasActive = false;
          loadAgentDialogue();
        }

        if (isThinking && !isTyping) {
          holdThinkingForIncomingDialogue();
          return;
        }

        if (!holdThinkingUntilNextDialogue) {
          setThinking(false);
        }
      } catch (error) {
        console.error("Thinking status poll failed:", error);
      } finally {
        statusPollInFlight = false;
      }
    }

    loadAgentDialogue();
    loadThinkingStatus();
    const dialogueIntervalId = setInterval(loadAgentDialogue, pollIntervalMs);
    const thinkingIntervalId = setInterval(loadThinkingStatus, statusPollIntervalMs);
    window.addEventListener("resize", fitSpeechToViewport);
    window.addEventListener("resize", resizeSpiralCanvas);
    window.addEventListener("pagehide", () => {
      clearInterval(dialogueIntervalId);
      clearInterval(thinkingIntervalId);
      cancelAnimationFrame(spiralFrameId);
      clearThinkingHold();
    });
    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState !== "visible") {
        return;
      }

      dialoguePollInFlight = false;
      statusPollInFlight = false;
      resizeSpiralCanvas();
      loadAgentDialogue();
      loadThinkingStatus();
    });

    if (document.fonts) {
      document.fonts.ready.then(fitSpeechToViewport).catch(() => {});
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Agent Dialogue</title>
  <link rel="stylesheet" href="/static/styles.css" />
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      margin: 0;
    }

    body {
      overflow: hidden;
    }

    main {
      height: 100vh;
      overflow: hidden;
      padding: clamp(1.5rem, 3vw, 3rem);
      position: relative;
    }

    h1 {
      font-size: clamp(4rem, 8vw, 9rem);
      line-height: 0.9;
      margin: 0 0 clamp(1.25rem, 3vw, 2.5rem);
      text-transform: uppercase;
    }

    .meta {
      color: var(--color-agent-meta);
      font-size: clamp(1.4rem, 2vw, 2.25rem);
      line-height: 1.2;
      margin-bottom: clamp(1.4rem, 3vw, 2.5rem);
    }

    .speech {
      color: var(--color-agent-text);
      font-size: clamp(2rem, 3.6vw, 5rem);
      line-height: 1.25;
      overflow-wrap: break-word;
      text-transform: uppercase;
    }

    .speech-shell {
      position: relative;
    }

    .spiral-canvas {
      inset: 0;
      opacity: 0;
      pointer-events: none;
      position: absolute;
      transition: opacity 180ms ease;
      transform-origin: center;
      width: 100%;
      height: 100%;
    }

    .thinking .speech {
      opacity: 0.28;
    }

    .thinking .spiral-canvas {
      animation: spiralSpin 2.8s linear infinite;
      opacity: 1;
    }

    .waiting {
      font-family: system-ui, sans-serif;
      text-transform: none;
    }

    .cursor::after {
      content: "▋";
      margin-left: 2px;
      animation: blink 0.8s infinite;
    }

    @keyframes blink {
      0%, 50% { opacity: 1; }
      51%, 100% { opacity: 0; }
    }

    @keyframes spiralSpin {
      0% {
        transform: rotate(0deg) scaleX(1) scaleY(1);
      }

      50% {
        transform: rotate(180deg) scaleX(1.08) scaleY(0.92);
      }

      100% {
        transform: rotate(360deg) scaleX(1) scaleY(1);
      }
    }
  </style>
</head>

<body>
  <main id="page" class="">
    <h1 id="agent-name">Agent</h1>
    <div id="meta" class="meta">Waiting for output.</div>
    <div class="speech-shell">
      <div id="speech" class="speech waiting">Start or advance the simulation to update this display.</div>
      <canvas id="spiral" class="spiral-canvas"></canvas>
    </div>
  </main>

  <script>
    const pollIntervalMs = 1500;
    let latestTurnKey = "";
    let isTyping = false;
    let isThinking = false;
    let spiralFrameId = 0;
    let spiralIsAnimating = false;

    function titleize(value) {
      return value.charAt(0).toUpperCase() + value.slice(1);
    }

    function setText(id, value) {
      document.getElementById(id).textContent = value;
    }

    function getDisplayFontSize() {
      const widthSize = window.innerWidth * 0.036;
      return Math.max(32, Math.min(widthSize, 80));
    }

    function fitSpeechToViewport() {
      const speech = document.getElementById("speech");
      const styles = getComputedStyle(document.getElementById("page"));
      const bottomPadding = parseFloat(styles.paddingBottom) || 0;
      const availableHeight = window.innerHeight - speech.offsetTop - bottomPadding - 12;
      const maxSize = getDisplayFontSize();
      const minSize = 20;

      speech.style.fontSize = `${maxSize}px`;

      let size = maxSize;
      while (speech.scrollHeight > availableHeight && size > minSize) {
        size -= 2;
        speech.style.fontSize = `${size}px`;
      }
    }

    function setSpeech(value) {
      setText("speech", value);
      requestAnimationFrame(fitSpeechToViewport);
    }

    function resizeSpiralCanvas() {
      const canvas = document.getElementById("spiral");
      const rect = canvas.getBoundingClientRect();
      const scale = window.devicePixelRatio || 1;
      canvas.width = Math.max(1, Math.floor(rect.width * scale));
      canvas.height = Math.max(1, Math.floor(rect.height * scale));
    }

    function drawSpiralText(time = 0) {
      if (!isThinking) {
        spiralIsAnimating = false;
        return;
      }

      spiralIsAnimating = true;

      const canvas = document.getElementById("spiral");
      const speech = document.getElementById("speech");
      const context = canvas.getContext("2d");
      const rect = canvas.getBoundingClientRect();
      const scale = window.devicePixelRatio || 1;
      const text = speech.textContent || "";
      const styles = getComputedStyle(speech);
      const fontSize = parseFloat(styles.fontSize) || 48;
      const fontFamily = styles.fontFamily || "system-ui, sans-serif";

      if (canvas.width !== Math.floor(rect.width * scale) || canvas.height !== Math.floor(rect.height * scale)) {
        resizeSpiralCanvas();
      }

      context.setTransform(scale, 0, 0, scale, 0, 0);
      context.clearRect(0, 0, rect.width, rect.height);
      context.fillStyle = getComputedStyle(document.documentElement).getPropertyValue("--color-agent-text").trim() || "#111";
      context.font = `${fontSize}px ${fontFamily}`;
      context.textBaseline = "middle";

      const compactText = text.replace(/\s+/g, " ").trim() || "thinking";
      const centerX = rect.width * 0.5;
      const centerY = rect.height * 0.48;
      const maxRadius = Math.hypot(rect.width, rect.height) * 0.46;
      const chars = compactText.repeat(8);
      const spin = time * 0.0006;

      for (let i = 0; i < chars.length; i++) {
        const t = i / Math.max(1, chars.length - 1);
        const angle = t * Math.PI * 9 + spin;
        const radius = 18 + t * maxRadius;
        const wobble = Math.sin(time * 0.004 + i * 0.7) * 10;
        const x = centerX + Math.cos(angle) * (radius + wobble);
        const y = centerY + Math.sin(angle) * radius * 0.6;

        context.save();
        context.translate(x, y);
        context.rotate(angle + Math.PI / 2);
        context.scale(1 + Math.sin(time * 0.003 + i) * 0.35, 0.75 + Math.cos(time * 0.004 + i) * 0.2);
        context.fillText(chars[i], 0, 0);
        context.restore();
      }

      spiralFrameId = requestAnimationFrame(drawSpiralText);
    }

    function startSpiralAnimation() {
      if (spiralIsAnimating) {
        return;
      }

      resizeSpiralCanvas();
      spiralFrameId = requestAnimationFrame(drawSpiralText);
    }

    function setThinking(nextIsThinking) {
      if (isThinking === nextIsThinking) {
        if (isThinking) {
          startSpiralAnimation();
        }

        return;
      }

      isThinking = nextIsThinking;
      document.getElementById("page").classList.toggle("thinking", isThinking);

      if (isThinking) {
        startSpiralAnimation();
      } else {
        cancelAnimationFrame(spiralFrameId);
        spiralIsAnimating = false;
        const canvas = document.getElementById("spiral");
        const context = canvas.getContext("2d");
        context.clearRect(0, 0, canvas.width, canvas.height);
      }
    }

    function typeText(element, text, speed = 18) {
      element.textContent = "";
      element.classList.add("cursor");
      isTyping = true;

      let index = 0;

      function typeNextCharacter() {
        if (index < text.length) {
          element.textContent += text[index];
          index++;
          requestAnimationFrame(fitSpeechToViewport);
          setTimeout(typeNextCharacter, speed);
        } else {
          element.classList.remove("cursor");
          isTyping = false;
          loadThinkingStatus();
        }
      }

      typeNextCharacter();
    }

    function typeSpeech(value) {
      const speech = document.getElementById("speech");
      typeText(speech, value);
    }

    async function loadAgentDialogue() {
      if (isTyping) {
        return;
      }

      const pathParts = window.location.pathname.split("/");
      const agentName = pathParts[pathParts.length - 1];

      const response = await fetch("/api/sim/conversation", {
        cache: "no-store"
      });
      const conversation = await response.json();
      const filtered = conversation.filter(entry => entry.speaker === agentName);
      const latest = filtered[filtered.length - 1];

      document.title = `${titleize(agentName)} Dialogue`;
      document.getElementById("page").className = `${agentName}${isThinking ? " thinking" : ""}`;
      setText("agent-name", titleize(agentName));

      if (!latest) {
        setText("meta", "Waiting for output.");
        document.getElementById("speech").classList.add("waiting");
        setSpeech(`No dialogue yet for ${titleize(agentName)}.`);
        return;
      }

      const turnKey = `${latest.turn}:${latest.speech}`;
      if (turnKey === latestTurnKey) {
        return;
      }

      latestTurnKey = turnKey;
      setText("meta", `Turn ${latest.turn} · Mood: ${latest.mood || "—"}`);
      document.getElementById("speech").classList.remove("waiting");
      typeSpeech(latest.speech || "No speech returned.");
    }

    async function loadThinkingStatus() {
      const pathParts = window.location.pathname.split("/");
      const agentName = pathParts[pathParts.length - 1];
      const response = await fetch("/api/sim/status", {
        cache: "no-store"
      });
      const status = await response.json();

      setThinking(status.active_agent === agentName && !isTyping);
    }

    loadAgentDialogue();
    loadThinkingStatus();
    setInterval(loadAgentDialogue, pollIntervalMs);
    setInterval(loadThinkingStatus, 500);
    window.addEventListener("resize", fitSpeechToViewport);
    window.addEventListener("resize", resizeSpiralCanvas);

    if (document.fonts) {
      document.fonts.ready.then(fitSpeechToViewport);
    }
  </script>
</body>
</html>

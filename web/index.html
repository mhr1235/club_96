<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Club_96</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #111;
      color: #f4f4f4;
      padding: 2rem;
      max-width: 1000px;
      margin: auto;
    }

    h1 {
      margin-bottom: 0.25rem;
    }

    .subtitle {
      color: #aaa;
      margin-bottom: 1.5rem;
    }

    button {
      padding: 0.8rem 1rem;
      border-radius: 999px;
      border: 0;
      cursor: pointer;
      font-weight: bold;
    }

    textarea {
      box-sizing: border-box;
      width: 100%;
      min-height: 8rem;
      resize: vertical;
      border: 1px solid #444;
      border-radius: 12px;
      padding: 0.9rem;
      background: #111;
      color: #f4f4f4;
      font: inherit;
      line-height: 1.45;
      margin: 0.5rem 0 0.8rem;
    }

    textarea:focus {
      outline: 2px solid #888;
      outline-offset: 2px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1rem;
    }

    .card {
      border: 1px solid #444;
      border-radius: 16px;
      padding: 1.5rem;
      background: #1c1c1c;
    }

    .label {
      color: #aaa;
      font-size: 0.75rem;
      text-transform: uppercase;
      margin-top: 1rem;
      letter-spacing: 0.05em;
    }

    .speech {
      font-size: 1.05rem;
      line-height: 1.5;
    }

    pre {
      white-space: pre-wrap;
      background: #000;
      padding: 1rem;
      border-radius: 12px;
      overflow-x: auto;
    }

    .status {
      color: #aaa;
      margin: 1rem 0;
    }

    .prompt-button {
      margin-bottom: 1rem;
    }
  </style>
</head>
<body>
  <h1>Club_96</h1>
  <p class="subtitle">Custom prompt tester for individual agents.</p>

  <div id="status" class="status">Ready.</div>

  <div class="grid">
    <div class="card" id="card-alice">
      <h2>Alice</h2>
      <label class="label" for="alice-prompt">Custom Prompt</label>
      <textarea id="alice-prompt" placeholder="Ask Alice something directly..."></textarea>
      <button class="prompt-button" onclick="promptAgent('alice')">Ask Alice</button>
      <div class="label">Speech</div>
      <div id="alice-speech" class="speech">Waiting.</div>
      <div class="label">Mood</div>
      <div id="alice-mood">—</div>
      <div class="label">Action</div>
      <pre id="alice-action">—</pre>
      <div class="label">Memory Update</div>
      <div id="alice-memory">—</div>
    </div>

    <div class="card" id="card-bob">
      <h2>Bob</h2>
      <label class="label" for="bob-prompt">Custom Prompt</label>
      <textarea id="bob-prompt" placeholder="Ask Bob something directly..."></textarea>
      <button class="prompt-button" onclick="promptAgent('bob')">Ask Bob</button>
      <div class="label">Speech</div>
      <div id="bob-speech" class="speech">Waiting.</div>
      <div class="label">Mood</div>
      <div id="bob-mood">—</div>
      <div class="label">Action</div>
      <pre id="bob-action">—</pre>
      <div class="label">Memory Update</div>
      <div id="bob-memory">—</div>
    </div>

    <div class="card" id="card-mallory">
      <h2>Mallory</h2>
      <label class="label" for="mallory-prompt">Custom Prompt</label>
      <textarea id="mallory-prompt" placeholder="Ask Mallory something directly..."></textarea>
      <button class="prompt-button" onclick="promptAgent('mallory')">Ask Mallory</button>
      <div class="label">Speech</div>
      <div id="mallory-speech" class="speech">Waiting.</div>
      <div class="label">Mood</div>
      <div id="mallory-mood">—</div>
      <div class="label">Action</div>
      <pre id="mallory-action">—</pre>
      <div class="label">Memory Update</div>
      <div id="mallory-memory">—</div>
    </div>
  </div>

  <script>
    function setAgentLoading(agentName) {
      document.getElementById(`${agentName}-speech`).textContent = "Thinking...";
      document.getElementById(`${agentName}-mood`).textContent = "—";
      document.getElementById(`${agentName}-action`).textContent = "—";
      document.getElementById(`${agentName}-memory`).textContent = "—";
    }

    function setAgentOutput(agentName, data) {
      if (data.error) {
        document.getElementById(`${agentName}-speech`).textContent = data.error;
        return;
      }

      document.getElementById(`${agentName}-speech`).textContent = data.speech || "No speech returned.";
      document.getElementById(`${agentName}-mood`).textContent = data.mood || "—";
      document.getElementById(`${agentName}-action`).textContent = JSON.stringify(data.action || {}, null, 2);
      document.getElementById(`${agentName}-memory`).textContent = data.memory_update || "—";
    }

    async function promptAgent(agentName) {
      const prompt = document.getElementById(`${agentName}-prompt`).value.trim();

      if (!prompt) {
        document.getElementById("status").textContent = `Enter a prompt for ${agentName}.`;
        return;
      }

      setAgentLoading(agentName);
      document.getElementById("status").textContent = `Asking ${agentName}...`;

      try {
        const response = await fetch(`/api/${agentName}/prompt`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({ prompt }),
        });
        const data = await response.json();
        setAgentOutput(agentName, data);
        document.getElementById("status").textContent = `Finished ${agentName}.`;
      } catch (error) {
        document.getElementById(`${agentName}-speech`).textContent = `Error: ${error}`;
        document.getElementById("status").textContent = `Error asking ${agentName}.`;
      }
    }
  </script>
</body>
</html>
